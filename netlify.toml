[build]
  command = "npx playwright install chromium --with-deps && npm run generate && npm run generate:resume"
  publish = ".output/public"

# Block indexing on all non-production deploys (branch deploys, deploy previews)
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Allow indexing on production only
[[context.production.headers]]
  for = "/*"
  [context.production.headers.values]
    X-Robots-Tag = "index, follow"
