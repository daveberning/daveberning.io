name: Netlify CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run test:coverage

  browser-tests:
    name: Browser Test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run test:browser:${{ matrix.browser }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-coverage, browser-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run generate
        env:
          CONTENT_REPO_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: .output/public
          retention-days: 1

  generate-pdf:
    name: Generate Resume PDF
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: .output/public
      - run: npx playwright install chromium --with-deps
      - id: generate
        run: npm run generate:resume
        continue-on-error: true
      - name: Fallback — download previous PDF from live site
        if: steps.generate.outcome == 'failure'
        run: |
          curl -L https://daveberning.io/dave-berning-resume.pdf \
            -o .output/public/dave-berning-resume.pdf \
            --fail --silent || echo "Warning: fallback PDF download also failed"
      - uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: .output/public/dave-berning-resume.pdf
          if-no-files-found: warn
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, generate-pdf]
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    if: always() && needs.build.result == 'success' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: .output/public
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: resume-pdf
          path: .output/public
      - uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: .output/public
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: ${{ github.event.head_commit.message }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
